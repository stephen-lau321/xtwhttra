<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新农人技能匹配程序</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>新农人技能匹配程序</h1>
        </header>
        
        <nav>
            <ul>
                <li><button class="nav-btn" data-section="add-farmer">添加新农人</button></li>
                <li><button class="nav-btn" data-section="add-request">添加技能需求</button></li>
                <li><button class="nav-btn" data-section="match-skills">匹配技能</button></li>
                <li><button class="nav-btn" data-section="view-farmers">查看新农人</button></li>
                <li><button class="nav-btn" data-section="view-requests">查看技能需求</button></li>
                <li><button class="nav-btn" data-section="add-sample">添加示例数据</button></li>
            </ul>
        </nav>
        
        <main>
            <!-- 添加新农人 -->
            <section id="add-farmer" class="section">
                <h2>添加新农人</h2>
                <form id="farmer-form">
                    <div class="form-group">
                        <label for="farmer-name">姓名</label>
                        <input type="text" id="farmer-name" required>
                    </div>
                    <div class="form-group">
                        <label for="farmer-skills">技能（用逗号分隔）</label>
                        <input type="text" id="farmer-skills" required>
                    </div>
                    <button type="submit" class="btn">添加</button>
                </form>
                <div id="farmer-message" class="message"></div>
            </section>
            
            <!-- 添加技能需求 -->
            <section id="add-request" class="section">
                <h2>添加技能需求</h2>
                <form id="request-form">
                    <div class="form-group">
                        <label for="request-title">需求标题</label>
                        <input type="text" id="request-title" required>
                    </div>
                    <div class="form-group">
                        <label for="request-type">预设需求类型</label>
                        <select id="request-type">
                            <option value="">选择预设需求类型</option>
                            <option value="0基础拍摄小白想学拍摄">0基础拍摄小白想学拍摄</option>
                            <option value="0基础剪辑小白想学剪辑">0基础剪辑小白想学剪辑</option>
                            <option value="0基础文案小白想学写文案">0基础文案小白想学写文案</option>
                            <option value="不会表达想学表达">不会表达想学表达</option>
                            <option value="普通话不行想学普通话">普通话不行想学普通话</option>
                            <option value="会初步拍摄想学更多专业拍摄">会初步拍摄想学更多专业拍摄</option>
                            <option value="会初步剪辑想学高阶剪辑">会初步剪辑想学高阶剪辑</option>
                            <option value="0基础运营小白想学视频运营">0基础运营小白想学视频运营</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="request-skills">所需技能（用逗号分隔）</label>
                        <input type="text" id="request-skills" required>
                    </div>
                    <button type="submit" class="btn">添加</button>
                </form>
                <div id="request-message" class="message"></div>
            </section>
            
            <!-- 匹配技能 -->
            <section id="match-skills" class="section">
                <h2>技能匹配结果</h2>
                <div id="match-results"></div>
            </section>
            
            <!-- 查看新农人 -->
            <section id="view-farmers" class="section">
                <h2>所有新农人</h2>
                <div id="farmers-list"></div>
            </section>
            
            <!-- 查看技能需求 -->
            <section id="view-requests" class="section">
                <h2>所有技能需求</h2>
                <div id="requests-list"></div>
            </section>
            
            <!-- 添加示例数据 -->
            <section id="add-sample" class="section">
                <h2>添加示例数据</h2>
                <p>点击下方按钮添加示例数据，包括4个新农人和3个技能需求。</p>
                <button id="sample-btn" class="btn">添加示例数据</button>
                <div id="sample-message" class="message"></div>
            </section>
        </main>
        
        <footer>
            <p>© 2026 新农人技能匹配程序</p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
