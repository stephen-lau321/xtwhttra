version: "3.8"

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: streetmusic-postgres
    environment:
      POSTGRES_DB: streetmusic
      POSTGRES_USER: streetmusic
      POSTGRES_PASSWORD: streetmusic123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: streetmusic-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
